# Codecast Configuration (v2)
# Copy this file to config.yaml and edit as needed.

daemon:
  port: 9100                    # Daemon RPC port (default: 9100)
  bind: 127.0.0.1              # Bind address (default: 127.0.0.1)
  log_file: ~/.codecast/daemon.log  # Daemon log file

peers:
  # Example: HTTP peer (direct connection, no SSH)
  # gpu-1:
  #   type: http
  #   url: http://gpu1.example.com:9100
  #   default_paths:
  #     - /home/your-user/project-a
  #     - /home/your-user/project-b

  # Example: SSH peer (connection via SSH tunnel)
  # gpu-2:
  #   type: ssh
  #   host: gpu2.lab.internal
  #   user: your-ssh-user
  #   # ssh_key: ~/.ssh/id_rsa    # Optional: path to SSH key (defaults to ssh-agent)
  #   # port: 22                  # SSH port (default: 22)
  #   # proxy_jump: gpu-1         # Optional: jump host
  #   daemon_port: 9100           # Port for daemon RPC (default: 9100)
  #   # node_path: /usr/bin/node  # Optional: path to node on remote
  #   default_paths:
  #     - /home/your-user/project-a

bot:
  discord:
    token: ${DISCORD_TOKEN}     # Set via environment variable
    allowed_channels:           # Only respond in these channels (empty = all)
      # - 123456789012345678
    command_prefix: "/"
    admin_users:                # Discord user IDs allowed to use /restart, /update
      # - 123456789012345678

  telegram:
    token: ${TELEGRAM_TOKEN}    # Set via environment variable
    allowed_users:              # Only respond to these user IDs (empty = all)
      # - 123456789

  # lark:
  #   app_id: ${LARK_APP_ID}           # Feishu app ID (from open.feishu.cn)
  #   app_secret: ${LARK_APP_SECRET}   # Feishu app secret
  #   allowed_chats: []                # Chat IDs to respond in (empty = all)
  #   admin_users: []                  # Admin open_ids for /restart, /update
  #   use_cards: true                  # Use interactive cards for status display

webui:
  port: 31949                   # WebUI HTTP port
  bind: 127.0.0.1              # Bind address
  enabled: true                 # Enable WebUI

# Default permission mode for new sessions
# auto = bypassPermissions (full auto, no confirmation needed)
# code = acceptEdits (auto accept file edits, confirm bash)
# plan = read-only analysis
# ask  = confirm everything
default_mode: auto

# Number of tool_use messages to batch into one message (default: 15)
# Set to 1 to disable batching (send each tool call as a separate message)
tool_batch_size: 15

skills:
  shared_dir: ./skills          # Local skills directory to sync to remotes
  sync_on_start: true           # Sync skills when /start creates a session
